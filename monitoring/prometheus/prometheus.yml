global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: edtech-local

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - user-service:8001

  - job_name: course-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - course-service:8002

  - job_name: content-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - content-service:8003

  - job_name: quiz-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - quiz-service:8004

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification-service:8005

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets:
          - otel-collector:9464

  - job_name: node-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: cadvisor
    metrics_path: /metrics
    static_configs:
      - targets:
          - cadvisor:8080
