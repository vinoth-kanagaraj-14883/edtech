---
- name: Install frontend dependencies
  ansible.builtin.apt:
    name: [curl, git, ca-certificates, gnupg, nginx]
    state: present
    update_cache: true
  tags: ["install"]

- name: Add NodeSource keyring
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /usr/share/keyrings/nodesource.gpg
    mode: "0644"
  tags: ["install"]

- name: Add NodeSource apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main"
    filename: nodesource
    state: present
  tags: ["install"]

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  tags: ["install"]

- name: Create frontend directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"
  loop: ["{{ service_dir }}", "{{ service_dir }}/repo"]
  tags: ["install"]

- name: Checkout source repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ service_dir }}/repo"
    version: "{{ repo_branch }}"
    force: true
  become_user: "{{ app_user }}"
  tags: ["install", "update"]

- name: Install frontend dependencies
  ansible.builtin.command: npm ci
  args:
    chdir: "{{ service_dir }}/repo/{{ repo_subdir }}"
  become_user: "{{ app_user }}"
  changed_when: false
  tags: ["install", "update"]

- name: Build frontend
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ service_dir }}/repo/{{ repo_subdir }}"
  become_user: "{{ app_user }}"
  changed_when: false
  tags: ["install", "update"]

- name: Render frontend env
  ansible.builtin.template:
    src: frontend.env.j2
    dest: "{{ service_dir }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0640"
  notify: Restart frontend
  tags: ["configure"]

- name: Render frontend service
  ansible.builtin.template:
    src: frontend.service.j2
    dest: /etc/systemd/system/frontend.service
    mode: "0644"
  notify: Restart frontend
  tags: ["configure"]

- name: Render nginx config
  ansible.builtin.template:
    src: nginx-frontend.conf.j2
    dest: /etc/nginx/sites-available/frontend
    mode: "0644"
  notify: Restart nginx
  tags: ["configure"]

- name: Enable nginx frontend site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/frontend
    dest: /etc/nginx/sites-enabled/frontend
    state: link
  notify: Restart nginx
  tags: ["configure"]

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx
  tags: ["configure"]

- name: Render frontend logrotate
  ansible.builtin.template:
    src: frontend.logrotate.j2
    dest: /etc/logrotate.d/frontend
    mode: "0644"
  tags: ["configure"]

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    proto: tcp
    port: "80"
  tags: ["configure"]

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    proto: tcp
    port: "443"
  tags: ["configure"]

- name: Enable frontend
  ansible.builtin.systemd:
    name: frontend
    state: started
    enabled: true
  tags: ["restart"]

- name: Enable nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  tags: ["restart"]
