---
- name: Ensure promtail group exists
  ansible.builtin.group:
    name: "{{ promtail_group }}"
    system: true
  tags: ["install"]

- name: Ensure promtail user exists
  ansible.builtin.user:
    name: "{{ promtail_user }}"
    group: "{{ promtail_group }}"
    system: true
    create_home: false
  tags: ["install"]

- name: Create promtail directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ promtail_install_dir }}", owner: "root", group: "root", mode: "0755" }
    - { path: "/etc/promtail", owner: "root", group: "root", mode: "0755" }
    - { path: "/var/lib/promtail", owner: "{{ promtail_user }}", group: "{{ promtail_group }}", mode: "0755" }
  tags: ["install"]

- name: Download promtail
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"
    dest: "/tmp/promtail-{{ promtail_version }}.zip"
    mode: "0644"
  tags: ["install"]

- name: Extract promtail
  ansible.builtin.unarchive:
    src: "/tmp/promtail-{{ promtail_version }}.zip"
    dest: "{{ promtail_install_dir }}"
    remote_src: true
    creates: "{{ promtail_install_dir }}/promtail-linux-amd64"
  tags: ["install"]

- name: Install promtail binary
  ansible.builtin.copy:
    src: "{{ promtail_install_dir }}/promtail-linux-amd64"
    dest: "{{ promtail_bin }}"
    mode: "0755"
    remote_src: true
  notify: Restart promtail
  tags: ["install", "update"]

- name: Install promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    mode: "0644"
  notify: Restart promtail
  tags: ["configure"]

- name: Install promtail service
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: "0644"
  notify: Restart promtail
  tags: ["configure"]

- name: Enable and start promtail
  ansible.builtin.systemd:
    name: promtail
    enabled: true
    state: started
  tags: ["restart"]
