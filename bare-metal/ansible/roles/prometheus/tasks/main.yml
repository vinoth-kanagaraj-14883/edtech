---
- name: Create prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: [/etc/prometheus, "{{ prometheus_data_dir }}"]
  tags: ["install"]

- name: Download Prometheus
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    mode: "0644"
  tags: ["install"]

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
  tags: ["install"]

- name: Install Prometheus binary
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus"
    dest: "{{ prometheus_bin }}"
    remote_src: true
    mode: "0755"
  notify: Restart prometheus
  tags: ["install", "update"]

- name: Install Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config }}"
    mode: "0644"
  notify: Restart prometheus
  tags: ["configure"]

- name: Install Prometheus service
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify: Restart prometheus
  tags: ["configure"]

- name: Allow Prometheus port
  community.general.ufw:
    rule: allow
    proto: tcp
    port: "9090"
  tags: ["configure"]

- name: Enable Prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: true
  tags: ["restart"]
