server:
  port: 8002
  shutdown: graceful

spring:
  application:
    name: course-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/coursedb}
    username: ${DATABASE_USERNAME:courseuser}
    password: ${DATABASE_PASSWORD:coursepass}
    hikari:
      pool-name: course-service-hikari
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
      validation-timeout: 5000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

otel:
  service:
    name: course-service
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.edtech.courseservice: INFO
