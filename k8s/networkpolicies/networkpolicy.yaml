apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-metrics-allow
  namespace: monitoring
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - kube-state-metrics
          - node-exporter
          - loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
        - podSelector:
            matchLabels:
              app: grafana
        - podSelector:
            matchLabels:
              app: otel-collector
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9100
        - protocol: TCP
          port: 3100
