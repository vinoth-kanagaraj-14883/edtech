apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: edtech
  labels:
    app: frontend
    version: v1
    component: frontend
    part-of: edtech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        version: v1
        component: frontend
        part-of: edtech
    spec:
      serviceAccountName: frontend
      containers:
        - name: frontend
          image: edtech/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "3000"
            - name: API_BASE_URL
              value: http://api-gateway.edtech.svc.cluster.local:8080
            - name: OTEL_SERVICE_NAME
              value: frontend
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=frontend,service.version=v1,deployment.environment=production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: edtech
  labels:
    app: frontend
    version: v1
    component: frontend
    part-of: edtech
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
