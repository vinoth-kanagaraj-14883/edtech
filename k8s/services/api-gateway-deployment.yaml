apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: edtech
  labels:
    app: api-gateway
    version: v1
    component: gateway
    part-of: edtech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        version: v1
        component: gateway
        part-of: edtech
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: api-gateway
      containers:
        - name: api-gateway
          image: edtech/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "8080"
            - name: USER_SERVICE_URL
              value: http://user-service.edtech.svc.cluster.local:8001
            - name: COURSE_SERVICE_URL
              value: http://course-service.edtech.svc.cluster.local:8002
            - name: CONTENT_SERVICE_URL
              value: http://content-service.edtech.svc.cluster.local:8003
            - name: QUIZ_SERVICE_URL
              value: http://quiz-service.edtech.svc.cluster.local:8004
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service.edtech.svc.cluster.local:8005
            - name: OTEL_SERVICE_NAME
              value: api-gateway
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=api-gateway,service.version=v1,deployment.environment=production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edtech
  labels:
    app: api-gateway
    version: v1
    component: gateway
    part-of: edtech
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
