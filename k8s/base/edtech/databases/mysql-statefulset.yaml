apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-scripts
  namespace: edtech
  labels:
    app: mysql
    component: database
    part-of: edtech
data:
  01-init.sql: |
    CREATE DATABASE IF NOT EXISTS content_service;
    CREATE DATABASE IF NOT EXISTS quiz_service;
    CREATE USER IF NOT EXISTS 'content_service'@'%' IDENTIFIED BY 'content-db-example-password';
    CREATE USER IF NOT EXISTS 'quiz_service'@'%' IDENTIFIED BY 'quiz-db-example-password';
    GRANT ALL PRIVILEGES ON content_service.* TO 'content_service'@'%';
    GRANT ALL PRIVILEGES ON quiz_service.* TO 'quiz_service'@'%';
    FLUSH PRIVILEGES;
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: edtech
  labels:
    app: mysql
    component: database
    part-of: edtech
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: edtech
  labels:
    app: mysql
    component: database
    part-of: edtech
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9104"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: mysql
    - name: metrics
      port: 9104
      targetPort: metrics
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: edtech
  labels:
    app: mysql
    version: "8"
    component: database
    part-of: edtech
spec:
  serviceName: mysql-headless
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        version: "8"
        component: database
        part-of: edtech
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9104"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: mysql
          image: mysql:8
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - name: mysql
              containerPort: 3306
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h 127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
        - name: mysqld-exporter
          image: prom/mysqld-exporter:v0.15.1
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_NAME
              value: root:$(MYSQL_ROOT_PASSWORD)@(127.0.0.1:3306)/
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - name: metrics
              containerPort: 9104
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: init-scripts
          configMap:
            name: mysql-init-scripts
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
