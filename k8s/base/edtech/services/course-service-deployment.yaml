apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: edtech
  labels:
    app: course-service
    version: v1
    component: service
    part-of: edtech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course-service
  template:
    metadata:
      labels:
        app: course-service
        version: v1
        component: service
        part-of: edtech
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: course-service
      containers:
        - name: course-service
          image: edtech/course-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: SERVER_PORT
              value: "8002"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COURSE_DB_PASSWORD
            - name: DATABASE_URL
              value: jdbc:postgresql://postgresql.edtech.svc.cluster.local:5432/course_service
            - name: DATABASE_USERNAME
              value: course_service
            - name: OTEL_SERVICE_NAME
              value: course-service
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=course-service,service.version=v1,deployment.environment=production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
  namespace: edtech
  labels:
    app: course-service
    version: v1
    component: service
    part-of: edtech
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8002"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: ClusterIP
  selector:
    app: course-service
  ports:
    - name: http
      port: 8002
      targetPort: http
