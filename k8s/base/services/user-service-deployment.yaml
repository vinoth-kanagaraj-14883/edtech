apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: edtech
  labels:
    app: user-service
    version: v1
    component: service
    part-of: edtech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        version: v1
        component: service
        part-of: edtech
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: user-service
      containers:
        - name: user-service
          image: edtech/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "8001"
            - name: USER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://user_service:$(USER_DB_PASSWORD)@postgresql.edtech.svc.cluster.local:5432/user_service"
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: OTEL_SERVICE_NAME
              value: user-service
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=user-service,service.version=v1,deployment.environment=production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: edtech
  labels:
    app: user-service
    version: v1
    component: service
    part-of: edtech
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8001
      targetPort: http
