apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service
  namespace: edtech
  labels:
    app: quiz-service
    version: v1
    component: service
    part-of: edtech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiz-service
  template:
    metadata:
      labels:
        app: quiz-service
        version: v1
        component: service
        part-of: edtech
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: quiz-service
      containers:
        - name: quiz-service
          image: edtech/quiz-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8004
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: PORT
              value: "8004"
            - name: DB_HOST
              value: mysql.edtech.svc.cluster.local
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: quiz_service
            - name: DB_USER
              value: quiz_service
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: QUIZ_DB_PASSWORD
            - name: OTEL_SERVICE_NAME
              value: quiz-service
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=quiz-service,service.version=v1,deployment.environment=production
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service
  namespace: edtech
  labels:
    app: quiz-service
    version: v1
    component: service
    part-of: edtech
spec:
  type: ClusterIP
  selector:
    app: quiz-service
  ports:
    - name: http
      port: 8004
      targetPort: http
