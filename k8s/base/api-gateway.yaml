apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/vinoth-kanagaraj-14883/edtech-api-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: USER_SERVICE_URL
              value: http://user-service:8001
            - name: COURSE_SERVICE_URL
              value: http://course-service:8002
            - name: CONTENT_SERVICE_URL
              value: http://content-service:8003
            - name: QUIZ_SERVICE_URL
              value: http://quiz-service:8004
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8005
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
