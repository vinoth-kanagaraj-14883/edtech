apiVersion: v1
kind: Service
metadata:
  name: postgresql-headless
  namespace: edtech
  labels:
    app: postgresql
    component: database
    part-of: edtech
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: edtech
  labels:
    app: postgresql
    component: database
    part-of: edtech
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
    - name: metrics
      port: 9187
      targetPort: metrics
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: edtech
  labels:
    app: postgresql
    version: "15"
    component: database
    part-of: edtech
spec:
  serviceName: postgresql-headless
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        version: "15"
        component: database
        part-of: edtech
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: generate-initdb-script
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              cat <<'EOF' > /initdb/01-create-databases.sh
              #!/bin/sh
              set -eu
              cat <<'SQL' > /docker-entrypoint-initdb.d/01-create-databases.sql
              DO
              $$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'user_service') THEN
                  CREATE ROLE user_service LOGIN PASSWORD '${USER_DB_PASSWORD}';
                END IF;
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'course_service') THEN
                  CREATE ROLE course_service LOGIN PASSWORD '${COURSE_DB_PASSWORD}';
                END IF;
              END
              $$;

              SELECT 'CREATE DATABASE user_service OWNER user_service'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'user_service')\gexec
              SELECT 'CREATE DATABASE course_service OWNER course_service'
              WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'course_service')\gexec
              SQL
              chmod +x /initdb/01-create-databases.sh
              EOF
          volumeMounts:
            - name: initdb
              mountPath: /initdb
      containers:
        - name: postgresql
          image: postgres:15
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_SUPERUSER_PASSWORD
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_INITDB_ARGS
              value: --encoding=UTF8 --locale=C
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: USER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: USER_DB_PASSWORD
            - name: COURSE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: COURSE_DB_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d postgres -h 127.0.0.1
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d postgres -h 127.0.0.1
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent
          env:
            - name: DATA_SOURCE_URI
              value: 127.0.0.1:5432/postgres?sslmode=disable
            - name: DATA_SOURCE_USER
              value: postgres
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: POSTGRES_SUPERUSER_PASSWORD
          ports:
            - name: metrics
              containerPort: 9187
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: initdb
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
