services:
  api-gateway:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317

  user-service:
    environment:
      OTLP_ENDPOINT: otel-collector:4317

  course-service:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

  content-service:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

  quiz-service:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

  notification-service:
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    container_name: edtech-otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./observability/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: edtech-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: edtech-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.59
    container_name: edtech-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_PORT:-16686}:16686"
      - "14250:14250"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "4319:4317"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: edtech-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
