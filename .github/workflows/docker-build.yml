name: Docker Build and Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: api-gateway
          - service: user-service
            context: user-service
          - service: course-service
            context: course-service
          - service: content-service
            context: content-service
          - service: quiz-service
            context: quiz-service
          - service: notification-service
            context: notification-service
          - service: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f "${{ matrix.context }}/Dockerfile" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: docker/setup-qemu-action@v3
      - if: steps.present.outputs.value == 'true'
        uses: docker/setup-buildx-action@v3
      - if: steps.present.outputs.value == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: steps.present.outputs.value == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/edtech-${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
      - if: steps.present.outputs.value == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/edtech-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/edtech-${{ matrix.service }}:buildcache,mode=max
      - if: steps.present.outputs.value != 'true'
        run: echo "${{ matrix.context }}/Dockerfile not found; skipping"
