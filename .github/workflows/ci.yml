name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-go:
    name: lint-go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, notification-service]
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f "${{ matrix.service }}/go.mod" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
      - if: steps.present.outputs.value == 'true'
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60.3
          working-directory: ${{ matrix.service }}
      - if: steps.present.outputs.value != 'true'
        run: echo "${{ matrix.service }} not present; skipping"

  test-go:
    name: test-go (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, notification-service]
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f "${{ matrix.service }}/go.mod" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.service }}/go.mod
      - if: steps.present.outputs.value == 'true'
        working-directory: ${{ matrix.service }}
        run: go test ./...
      - if: steps.present.outputs.value != 'true'
        run: echo "${{ matrix.service }} not present; skipping"

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f user-service/requirements.txt ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: user-service/requirements.txt
      - if: steps.present.outputs.value == 'true'
        working-directory: user-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt flake8 mypy pytest
          flake8 .
          mypy . --ignore-missing-imports
      - if: steps.present.outputs.value != 'true'
        run: echo "user-service not present; skipping"

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f user-service/requirements.txt ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: user-service/requirements.txt
      - if: steps.present.outputs.value == 'true'
        working-directory: user-service
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          set +e
          python -m pytest -q
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 5 ]; then
            exit "$status"
          fi
      - if: steps.present.outputs.value != 'true'
        run: echo "user-service not present; skipping"

  lint-node:
    name: lint-node (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [content-service, frontend]
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f "${{ matrix.service }}/package.json" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package.json
      - if: steps.present.outputs.value == 'true'
        working-directory: ${{ matrix.service }}
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          if npm run | grep -q '^  lint$'; then
            npm run lint
          elif [ -f .eslintrc ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npx eslint . --ext .js,.jsx,.ts,.tsx
          else
            echo "No ESLint configuration found for ${{ matrix.service }}; skipping"
          fi
      - if: steps.present.outputs.value != 'true'
        run: echo "${{ matrix.service }} not present; skipping"

  test-node:
    name: test-node (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [content-service, frontend]
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f "${{ matrix.service }}/package.json" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package.json
      - if: steps.present.outputs.value == 'true'
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm test -- --runInBand
      - if: steps.present.outputs.value != 'true'
        run: echo "${{ matrix.service }} not present; skipping"

  build-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f course-service/pom.xml ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - if: steps.present.outputs.value == 'true'
        working-directory: course-service
        run: mvn -B verify
      - if: steps.present.outputs.value != 'true'
        run: echo "course-service not present; skipping"

  lint-ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: present
        run: |
          if [ -f quiz-service/Gemfile ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.present.outputs.value == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - if: steps.present.outputs.value == 'true'
        working-directory: quiz-service
        run: |
          bundle install
          bundle exec rubocop
      - if: steps.present.outputs.value != 'true'
        run: echo "quiz-service not present; skipping"
