# Site24x7 Bare-Metal Inventory
# =================================
# Copy this file and fill in your VM IP addresses.
# This extends the existing bare-metal/inventory.example.ini with Site24x7 groups.
#
# Usage:
#   cp inventory.example.ini /tmp/my-inventory.ini
#   vim /tmp/my-inventory.ini
#   ansible-playbook -i /tmp/my-inventory.ini ansible/site24x7.yml \
#     -e "site24x7_device_key=YOUR_KEY"

# ── Individual host groups (one service per VM) ──────────────────────────────

[api_gateway]
api-gateway-vm ansible_host=10.0.1.10 ansible_user=ubuntu

[user_service]
user-service-vm ansible_host=10.0.1.11 ansible_user=ubuntu

[course_service]
course-service-vm ansible_host=10.0.1.12 ansible_user=ubuntu

[content_service]
content-service-vm ansible_host=10.0.1.13 ansible_user=ubuntu

[quiz_service]
quiz-service-vm ansible_host=10.0.1.14 ansible_user=ubuntu

[notification_service]
notification-service-vm ansible_host=10.0.1.15 ansible_user=ubuntu

[frontend_host]
frontend-vm ansible_host=10.0.1.16 ansible_user=ubuntu

# ── Database VMs (server agent only, no APM) ────────────────────────────────

[databases]
postgresql-vm ansible_host=10.0.1.20 ansible_user=ubuntu
mysql-vm      ansible_host=10.0.1.21 ansible_user=ubuntu
redis-vm      ansible_host=10.0.1.22 ansible_user=ubuntu

# ── Observability VMs (server agent only) ───────────────────────────────────

[observability]
prometheus-vm ansible_host=10.0.1.30 ansible_user=ubuntu
grafana-vm    ansible_host=10.0.1.31 ansible_user=ubuntu

# ── Site24x7 parent groups ──────────────────────────────────────────────────

[site24x7:children]
api_gateway
user_service
course_service
content_service
quiz_service
notification_service
frontend_host
databases
observability

# ── All hosts (server agent runs on all) ────────────────────────────────────

[all:vars]
ansible_ssh_private_key_file=~/.ssh/edtech_key
ansible_python_interpreter=/usr/bin/python3
