# Strategic merge patch — course-service (Java/Spring Boot)
# Adds an init container to download the Site24x7 Java APM agent JAR,
# mounts it via emptyDir, and sets JAVA_TOOL_OPTIONS to attach the agent.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: edtech
spec:
  template:
    spec:
      initContainers:
        - name: site24x7-java-agent-downloader
          image: curlimages/curl:8.5.0
          command:
            - sh
            - -c
            - |
              echo "Downloading Site24x7 Java APM agent..."
              curl -fsSL -o /opt/site24x7/apm-agent.jar \
                https://staticdownloads.site24x7.com/APM/Java/site24x7-java-agent.jar
              echo "Download complete: $(ls -lh /opt/site24x7/apm-agent.jar)"
          volumeMounts:
            - name: site24x7-java-agent
              mountPath: /opt/site24x7
      containers:
        - name: course-service
          env:
            - name: SITE24X7_APM_KEY
              valueFrom:
                secretKeyRef:
                  name: site24x7-device-key
                  key: device-key
            - name: SITE24X7_SERVICE_NAME
              value: "edtech-course-service"
            - name: SITE24X7_APM_ENDPOINT
              value: "https://apmcollector.site24x7.com"
            # Attach the Java APM agent at JVM startup
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/opt/site24x7/apm-agent.jar"
            - name: SITE24X7_APM_APP_NAME
              value: "edtech-course-service"
          volumeMounts:
            - name: site24x7-java-agent
              mountPath: /opt/site24x7
              readOnly: true
      volumes:
        - name: site24x7-java-agent
          emptyDir: {}
