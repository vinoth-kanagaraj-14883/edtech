# Strategic merge patch — content-service (Node.js/TypeScript)
# Adds Site24x7 APM env vars. Install site24x7-apm and require it first (see apm-agent/nodejs/).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
  namespace: edtech
spec:
  template:
    spec:
      containers:
        - name: content-service
          env:
            - name: SITE24X7_APM_KEY
              valueFrom:
                secretKeyRef:
                  name: site24x7-device-key
                  key: device-key
            - name: SITE24X7_SERVICE_NAME
              value: "edtech-content-service"
            - name: SITE24X7_APM_ENDPOINT
              value: "https://apmcollector.site24x7.com"
            - name: SITE24X7_LOG_LEVEL
              value: "info"
